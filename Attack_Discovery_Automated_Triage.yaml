      #         Based on my analysis so far, I've isolated the host in question pending further investigation and
      #         analysis. As a next step, I'll notify the team.
      #       case_ids:
      #         - '{{ steps.create_case.output.case.id }}'
      #     headers:
      #       kbn-xsrf: string

      # # -------------------------------------------------------------------------
      # # STEP 15: notify_team
      # # -------------------------------------------------------------------------
      # # Interacts with the Slack API to perform messaging or channel operations.
      # # Liquid syntax used:
      # # - References output from previous step(s)
      # # - References workflow constant(s)
      # # - References current item in foreach loop
      # # -------------------------------------------------------------------------
      # - name: notify_team
      #   type: http
      #   with:
      #     url: '{{ consts.slack_web_hook }}'
      #     method: POST
      #     headers:
      #       content-type: application/json
      #     body: |
      #       {
      #         "blocks": [
      #           {
      #             "type": "header",
      #             "text": {
      #               "type": "plain_text",
      #               "text": "🚨 Attack Discovery: {{foreach.item.attack_discovery.title_with_replacements}}",
      #               "emoji": true
      #             }
      #           },
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "{{steps.ai_summary.output.data}} \n"
      #             }
      #           },
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "*📝 Current Status:*\n \n• ✅ Security case created with {{foreach.item.attack_discovery.alerts_context_count}} related alerts consolidated for investigation\n• ✅ Initial threat analysis completed by AI security agent\n• ✅ Affected host `srv-win-defend-07` isolated from network pending further review\n• ✅ Forensic data collection and evidence preservation in progress\n• ✅ Incident response workflow initiated with automated triage complete"
      #             }
      #           },
      #           {
      #             "type": "section",
      #             "fields": [
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Risk Score:* `{{foreach.item.risk_score}}`"
      #               },
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Alert Count:* {{foreach.item.attack_discovery.alerts_context_count}}"
      #               },
      #               {
      #                 "type": "mrkdwn",
      #                 "text": "*Status:* {{foreach.item.status}}"
      #               },
      #               {
